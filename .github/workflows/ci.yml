name: CI

permissions:
  contents: read
  issues: write

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  GH_TOKEN: ${{ github.token }}
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release

      - name: Create Issue on Failure
        if: failure()
        run: |
          TITLE="CI Failure: backend on ${BRANCH_NAME}"
          if ! gh issue list --repo "$GITHUB_REPOSITORY" --state open --label bug --json title --jq '.[].title' | grep -Fx "$TITLE"; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --label "bug,ci" \
              --body "## CI Failure — Backend (.NET)

          **Event:** ${{ github.event_name }}
          **Branch:** ${BRANCH_NAME}
          **Commit:** ${GITHUB_SHA}
          **Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          **Triggered by:** ${GITHUB_ACTOR}
          **PR:** ${{ github.event.pull_request.html_url || 'N/A' }}

          The backend build or tests failed. Check the run logs for details."
          fi

      - name: Close stale CI failure issue
        if: success()
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" --state open --label bug --search "CI Failure: backend on ${BRANCH_NAME}" --json number --jq '.[].number' | while read -r num; do
            if [ -n "$num" ]; then
              gh issue close --repo "$GITHUB_REPOSITORY" "$num"
              gh issue comment --repo "$GITHUB_REPOSITORY" "$num" --body "✅ CI is passing again on ${BRANCH_NAME}"
            fi
          done

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Create Issue on Failure
        if: failure()
        run: |
          TITLE="CI Failure: frontend on ${BRANCH_NAME}"
          if ! gh issue list --repo "$GITHUB_REPOSITORY" --state open --label bug --json title --jq '.[].title' | grep -Fx "$TITLE"; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --label "bug,ci" \
              --body "## CI Failure — Frontend (React + Vite)

          **Event:** ${{ github.event_name }}
          **Branch:** ${BRANCH_NAME}
          **Commit:** ${GITHUB_SHA}
          **Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          **Triggered by:** ${GITHUB_ACTOR}
          **PR:** ${{ github.event.pull_request.html_url || 'N/A' }}

          The frontend build or tests failed. Check the run logs for details."
          fi

      - name: Close stale CI failure issue
        if: success()
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" --state open --label bug --search "CI Failure: frontend on ${BRANCH_NAME}" --json number --jq '.[].number' | while read -r num; do
            if [ -n "$num" ]; then
              gh issue close --repo "$GITHUB_REPOSITORY" "$num"
              gh issue comment --repo "$GITHUB_REPOSITORY" "$num" --body "✅ CI is passing again on ${BRANCH_NAME}"
            fi
          done

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: frontend:latest

      - name: Create Issue on Failure
        if: failure()
        run: |
          TITLE="CI Failure: docker on ${BRANCH_NAME}"
          if ! gh issue list --repo "$GITHUB_REPOSITORY" --state open --label bug --json title --jq '.[].title' | grep -Fx "$TITLE"; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --label "bug,ci" \
              --body "## CI Failure — Docker Images

          **Event:** ${{ github.event_name }}
          **Branch:** ${BRANCH_NAME}
          **Commit:** ${GITHUB_SHA}
          **Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          **Triggered by:** ${GITHUB_ACTOR}
          **PR:** ${{ github.event.pull_request.html_url || 'N/A' }}

          One or more Docker builds failed. Check the run logs for details."
          fi

      - name: Close stale CI failure issue
        if: success()
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" --state open --label bug --search "CI Failure: docker on ${BRANCH_NAME}" --json number --jq '.[].number' | while read -r num; do
            if [ -n "$num" ]; then
              gh issue close --repo "$GITHUB_REPOSITORY" "$num"
              gh issue comment --repo "$GITHUB_REPOSITORY" "$num" --body "✅ CI is passing again on ${BRANCH_NAME}"
            fi
          done
